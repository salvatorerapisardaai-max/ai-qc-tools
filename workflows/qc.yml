name: qc

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-control:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest -q

      - name: Run automated quality control (static-only)
        # Runs without an API key in CI; gates the build on the quality score.
        run: python ai_qc.py . --no-ai

      - name: Upload QC report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qc-report
          path: qc_report.md
